spring.application.name=voice-assistant

# The questionnaire (questions, options and branching) is fully data-driven from this file.
app.questionnaire.resource=classpath:questionnaire.json

# ---- Gemini Live API ----
# One bidirectional Live session per browser handles everything: it speaks each question,
# listens to the spoken answer (English or Bengali) and returns the matched option as a
# record_answer function call. No other model is involved. Create a key at
# https://aistudio.google.com/apikey
app.voice.api-key=${GEMINI_API_KEY:PLACEHOLDER_KEY}
app.voice.live-model=models/gemini-3.1-flash-live-preview
# Prebuilt Gemini Live voice used to speak the questions aloud.
app.voice.voice-name=Zephyr
