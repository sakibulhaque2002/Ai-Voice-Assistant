spring.application.name=voice-assistant

# Single switch controlling which AIProvider classifies transcribed answers: "gemini" or
# "openrouter". This only affects answer classification - listening always goes through
# Gemini, since only Gemini offers the Live API used here.
app.ai.provider=openrouter
app.questionnaire.resource=classpath:questionnaire.json

# ---- Gemini Live API - used only to listen to and transcribe spoken answers ----
# Create a key at https://aistudio.google.com/apikey
app.voice.api-key=${GEMINI_API_KEY:PLACEHOLDER_KEY}
app.voice.live-model=models/gemini-3.1-flash-live-preview

# ---- Gemini (Google GenAI Developer API) - used for answer classification via Spring AI ----
spring.ai.google.genai.api-key=${GEMINI_API_KEY:PLACEHOLDER_KEY}
spring.ai.google.genai.chat.model=gemini-2.5-flash
spring.ai.google.genai.chat.temperature=0.0
# Forces raw JSON output so ClassificationResult always deserializes cleanly.
spring.ai.google.genai.chat.response-mime-type=application/json

# ---- OpenRouter (via Spring AI's OpenAI-compatible client) ----
# Create a key at https://openrouter.ai/keys
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.api-key=${OPENROUTER_API_KEY:PLACEHOLDER_KEY}
spring.ai.openai.chat.model=openai/gpt-4o-mini
spring.ai.openai.chat.temperature=0.0
# Enables OpenAI-style JSON mode so ClassificationResult always deserializes cleanly.
spring.ai.openai.chat.response-format.type=JSON_OBJECT
